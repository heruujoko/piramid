name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build cross-platform binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              suffix=""
              if [[ "$os" == "windows" ]]; then suffix=".exe"; fi
              name="piramid-${os}-${arch}${suffix}"
              GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
                go build -trimpath -ldflags="-s -w" -o "dist/$name" ./cmd/piramid
            done
          done
          cd dist
          sha256sum piramid-* > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: piramid-binaries
          path: dist/
